services:
  db:
    image: postgres:16-alpine
    container_name: arkodata-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: arkodata
      POSTGRES_USER: arkodata
      POSTGRES_PASSWORD: arkodata
    volumes:
      - arkodata_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arkodata -d arkodata"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arkodata-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://arkodata:arkodata@db:5432/arkodata
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
    ports:
      - "5001:5000"

volumes:
  arkodata_postgres_data:
